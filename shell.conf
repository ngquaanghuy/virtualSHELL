# virtualSHELL Configuration File
# Edit these values to customize your shell

[shell]
name=virtualSHELL
version=1.0.0

[user]
username=admin
hostname=myserver
home=/home/user
shell=/bin/virtualsh

[environment]
PATH=/bin:/usr/bin:/usr/local/bin
PWD=/home/admin
HOME=/home/admin
LANG=en_US.UTF-8
TERM=xterm-256color
EDITOR=vim

[prompt]
format=\u@\h:\w\$
color=green
show_hostname=true
show_path=true

[sandbox]
auto_save=true
save_on_exit=true
data_file=data/save.dat
max_history=1000
create_default_dirs=true

[commands]
load_on_demand=true
show_load_message=true

[logging]
verbose=false
log_level=INFO
show_timestamps=true
colored_output=true
